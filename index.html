<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EdPlan NextGen UI Specs</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0 0 16px;
      color: #4b5563;
      line-height: 1.45;
    }
    a {
      display: inline-block;
      text-decoration: none;
      background: #111827;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
    }
    a:hover { background: #1f2937; }
  </style>
</head>
<body>
  <main class="card">
    <h1>EdPlan NextGen Design Specs</h1>
    <p>Open the form components specification page.</p>
    <a href="form-components.html">Open Form Components</a>
  </main>
</body>
</html>
